name: Publish pages-main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        env:
          BASE_PATH: ''
        run: npm run build

      - name: Copy GitHub Pages files
        run: |
          if [ -f CNAME ]; then
            cp CNAME build/CNAME
          fi
          if [ -f .nojekyll ]; then
            cp .nojekyll build/.nojekyll
          fi

      - name: Publish to pages-main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages-main
          publish_dir: ./build
          force_orphan: true
